name: Daily GitHub Trending

on:
  schedule:
    # 每天台灣時間早上 9 點 (UTC+8 → UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 手動觸發

permissions:
  contents: write

jobs:
  fetch-trending:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch trending repos
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-trending.mjs

      - name: Refresh notes missing Chinese content
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-trending.mjs --refresh-failed

      - name: Upgrade old format notes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-trending.mjs --refresh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Daily/ Repos/ MOC/ Weekly/ Dashboard.md data/
          git add Monthly/ Concepts/ Home.md Tech-Radar.canvas Triage.md 2>/dev/null || true
          git add .obsidian/snippets/ .obsidian/appearance.json .obsidian/graph.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "daily trending $(date +%Y-%m-%d)"
          # Rebase on remote; if conflict, keep our LLM-generated content
          if ! git pull --rebase origin main; then
            echo "Rebase conflict, falling back to merge..."
            git rebase --abort || true
            git pull --no-rebase origin main --strategy-option=ours || true
          fi
          git push || echo "Push failed — will retry on next run"
