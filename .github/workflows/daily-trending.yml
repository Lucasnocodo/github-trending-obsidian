name: Daily GitHub Trending

on:
  schedule:
    # 每天台灣時間早上 9 點 (UTC+8 → UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 手動觸發

permissions:
  contents: write

jobs:
  fetch-trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch trending repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-trending.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Daily/ Repos/ Dashboard.md data/
          git diff --staged --quiet || git commit -m "daily trending $(date +%Y-%m-%d)"
          git push
